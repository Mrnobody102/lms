name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast_checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm turbo typecheck
      - run: pnpm turbo lint
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fast_checks]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm turbo run build --concurrency=1 --filter=api-server --filter=web-admin --filter=web-student --filter=super-portal --filter=@repo/database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms_test
          JWT_SECRET: test-jwt-secret-for-ci

  e2e_chromium:
    name: E2E Chromium
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter web-student test:e2e

  api_smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - name: Create .env
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lms_test?schema=public" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "JWT_SECRET=test-jwt-secret-for-ci" >> .env
          echo "PORT=4000" >> .env
          echo "NODE_ENV=development" >> .env
      - run: pnpm --filter @repo/database db:push
      - run: pwsh -File ./scripts/smoke-api.ps1 -SkipContainerCheck
