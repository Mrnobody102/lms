name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast_checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci-32-characters-min
      JWT_EXPIRES_IN: 7d
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_WEB_STUDENT_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_TENANT_ID: tenant-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm run typecheck
      - run: pnpm turbo lint
      - run: pnpm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fast_checks]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci-32-characters-min
      JWT_EXPIRES_IN: 7d
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_WEB_STUDENT_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_TENANT_ID: tenant-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm turbo run build --concurrency=1 --filter=api-server --filter=web-admin --filter=web-student --filter=super-portal --filter=@repo/database

  e2e_chromium:
    name: E2E Chromium
    runs-on: ubuntu-latest
    needs: [build]
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_TENANT_ID: tenant-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter web-student test:e2e
      - run: pnpm --filter web-admin test:e2e
      - run: pnpm --filter super-portal test:e2e

  api_smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    needs: [build]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci-32-characters-min
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://127.0.0.1:3100,http://localhost:3000,http://localhost:3001,http://localhost:3002
      AUTH_COOKIE_SAME_SITE: lax
      MCP_ENABLED: 'false'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @repo/database generate
      - name: Create .env
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" >> .env
          echo "REDIS_URL=${REDIS_URL}" >> .env
          echo "JWT_SECRET=${JWT_SECRET}" >> .env
          echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}" >> .env
          echo "CORS_ORIGINS=${CORS_ORIGINS}" >> .env
          echo "AUTH_COOKIE_SAME_SITE=${AUTH_COOKIE_SAME_SITE}" >> .env
          echo "MCP_ENABLED=${MCP_ENABLED}" >> .env
          echo "PORT=4000" >> .env
          echo "NODE_ENV=development" >> .env
      - run: pnpm --filter @repo/database db:deploy
      - run: pwsh -File ./scripts/smoke-api.ps1 -SkipContainerCheck
