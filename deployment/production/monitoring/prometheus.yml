global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: lms-api
    metrics_path: /api/health/metrics/prometheus
    static_configs:
      - targets:
          - api:4000
        labels:
          service: api-server
          environment: production
