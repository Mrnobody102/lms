version: '3.8'

services:
  api:
    build:
      context: ../../
      dockerfile: apps/api-server/Dockerfile
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/lms_platform
      REDIS_URL: redis://redis:6379
      PORT: 4000
      # CORS_ORIGINS: https://lms.example.com,https://admin.lms.example.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lms_network

  web-student:
    build:
      context: ../../
      dockerfile: apps/web-student/Dockerfile
    ports:
      - '3000:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  web-admin:
    build:
      context: ../../
      dockerfile: apps/web-admin/Dockerfile
    ports:
      - '3001:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  super-portal:
    build:
      context: ../../
      dockerfile: apps/super-portal/Dockerfile
    ports:
      - '3002:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lms_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lms_platform']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lms_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lms_network

networks:
  lms_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
