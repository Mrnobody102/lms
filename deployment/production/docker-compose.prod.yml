services:
  migrate:
    build:
      context: ../../
      dockerfile: deployment/production/Dockerfile.migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lms_platform}}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms_network

  api:
    build:
      context: ../../
      dockerfile: apps/api-server/Dockerfile
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lms_platform}}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?Set APP_PUBLIC_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ALLOW_TENANT_HEADER_IN_PRODUCTION: ${ALLOW_TENANT_HEADER_IN_PRODUCTION:-false}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      PORT: 4000
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lms_network

  web-student:
    build:
      context: ../../
      dockerfile: apps/web-student/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB_SALES_URL: ${NEXT_PUBLIC_WEB_SALES_URL:?Set NEXT_PUBLIC_WEB_SALES_URL}
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    ports:
      - '3000:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WEB_SALES_URL: ${NEXT_PUBLIC_WEB_SALES_URL:?Set NEXT_PUBLIC_WEB_SALES_URL}
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  web-sales:
    build:
      context: ../../
      dockerfile: apps/web-sales/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB_STUDENT_URL: ${NEXT_PUBLIC_WEB_STUDENT_URL:?Set NEXT_PUBLIC_WEB_STUDENT_URL}
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    ports:
      - '3003:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WEB_STUDENT_URL: ${NEXT_PUBLIC_WEB_STUDENT_URL:?Set NEXT_PUBLIC_WEB_STUDENT_URL}
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  web-admin:
    build:
      context: ../../
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB_STUDENT_URL: ${NEXT_PUBLIC_WEB_STUDENT_URL:?Set NEXT_PUBLIC_WEB_STUDENT_URL}
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    ports:
      - '3001:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WEB_STUDENT_URL: ${NEXT_PUBLIC_WEB_STUDENT_URL:?Set NEXT_PUBLIC_WEB_STUDENT_URL}
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  super-portal:
    build:
      context: ../../
      dockerfile: apps/super-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    ports:
      - '3002:3000'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lms_network

  postgres:
    image: postgres:15.15-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lms_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lms_network

  redis:
    image: redis:7.4.7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lms_network

networks:
  lms_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
